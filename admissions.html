<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admissions | KL University</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-area"><h1>KL UNIVERSITY</h1></div>
        <nav><a href="index.html">Home</a><a href="about.html">About</a><a href="departments.html">Departments</a><a href="courses.html">Courses</a><a href="admissions.html">Admissions</a><a href="contact.html">Contact</a></nav>
    </header>

    <section>
        <div class="card">
            <h2>Start Your Journey</h2>
            <img src="images/admissions.jpg" alt="Campus Life" style="width:100%; border-radius:8px; margin: 1rem 0;">
            <p>Click below to access the official portal for the 2026-27 batch.</p>
            <a href="https://www.klh.edu.in/admissions" target="_blank" class="btn-submit" style="display:inline-block; text-align:center; text-decoration:none; background:var(--primary);">Visit Official KLH Portal →</a>
        </div>

        <div class="card" style="margin-top: 3rem;">
            <h3>Admission Inquiry Form</h3>
            <form action="#">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Interested Department</label>
                    <select>
                        <option>Computer Science (CSE)</option>
                        <option>Electronics (ECE)</option>
                        <option>Mechanical</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">Submit Inquiry</button>
            </form>
        </div>
    </section>
